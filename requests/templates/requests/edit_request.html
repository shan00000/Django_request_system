{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Request</title>

    <link rel="stylesheet" href="{% static 'requests/edit_request.css' %}">
</head>

<body>

    <main class="page-wrapper">

        <form method="post" class="edit-request-form">
            {% csrf_token %}

            <div class="form-header">
                <div>
                    <p class="eyebrow">Request System</p>
                    <h1>Edit Software Request</h1>
                </div>
            </div>

            <div class="field-group">
                <label for="application_name">Application Name</label>

                <input
                    id="application_name"
                    type="text"
                    name="application_name"
                    value="{{ software_request.application_name }}"
                    required
                >
            </div>

            <div class="field-group wide">
                <label for="application_description">Application Description</label>

                <textarea
                    id="application_description"
                    name="application_description"
                    rows="5"
                    required
                >{{ software_request.application_description }}</textarea>
            </div>

            <div class="field-group">
                <label for="application_website">Application Website</label>

                <input
                    id="application_website"
                    type="url"
                    name="application_website"
                    value="{{ software_request.application_website }}"
                >
            </div>

            <div class="checkbox-grid">

                <label class="checkbox-item">
                    <input
                        type="checkbox"
                        name="purchase_required"
                        {% if software_request.purchase_required %}checked{% endif %}
                    >
                    <span>Purchase Required</span>
                </label>

                <label class="checkbox-item">
                    <input
                        type="checkbox"
                        name="need_virtual_desktop"
                        {% if software_request.need_virtual_desktop %}checked{% endif %}
                    >
                    <span>Need Virtual Desktop</span>
                </label>

                <label class="checkbox-item">
                    <input
                        type="checkbox"
                        name="alternative_software_has_been_considered"
                        {% if software_request.alternative_software_has_been_considered %}checked{% endif %}
                    >
                    <span>Alternative Software Considered</span>
                </label>

                <label class="checkbox-item">
                    <input
                        type="checkbox"
                        name="privacy_considered"
                        {% if software_request.privacy_considered %}checked{% endif %}
                    >
                    <span>Privacy Considered</span>
                </label>

                <label class="checkbox-item">
                    <input
                        type="checkbox"
                        name="need_staff_machine"
                        {% if software_request.need_staff_machine %}checked{% endif %}
                    >
                    <span>Need Staff Machine</span>
                </label>

            </div>

            <div class="field-group wide">
                <label for="license_agreement_detail">License Agreement Detail</label>

                <textarea
                    id="license_agreement_detail"
                    name="license_agreement_detail"
                    rows="4"
                >{{ software_request.license_agreement_detail }}</textarea>
            </div>

            <div class="field-group">
                <label for="primary_use">Primary Use</label>

                <input
                    id="primary_use"
                    type="text"
                    name="primary_use"
                    value="{{ software_request.primary_use }}"
                    required
                >
            </div>

            <div class="field-group wide">
                <label for="need_installing_on">Need Installing On</label>

                <textarea
                    id="need_installing_on"
                    name="need_installing_on"
                    rows="4"
                    required
                >{{ software_request.need_installing_on }}</textarea>
            </div>

            <div class="field-group wide">
                <label for="anything_else">Anything Else</label>

                <textarea
                    id="anything_else"
                    name="anything_else"
                    rows="4"
                >{{ software_request.anything_else }}</textarea>
            </div>

            <div class="field-group">
                <label for="start_date">Start Date</label>

                <input
                    id="start_date"
                    type="date"
                    name="start_date"
                    value="{{ software_request.start_date|date:'Y-m-d' }}"
                    required
                >
            </div>

            <div class="button-row">

                <button type="submit" class="submit-button">
                    Save Changes
                </button>

                <a href="{% url 'requests:request_detail' software_request.pk %}" class="secondary-button">
                    Cancel
                </a>

            </div>

        </form>

    </main>

</body>
</html>
